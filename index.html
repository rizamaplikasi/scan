<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kamera</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;display:flex;flex-direction:column;height:100vh}
video{width:100%;height:80vh;object-fit:cover;transition:.3s}
.bar{display:flex;justify-content:center;gap:10px;padding:15px}
button{
padding:10px 18px;
border:none;
border-radius:20px;
background:#333;
color:#fff;
font-size:16px
}
.capture{
width:70px;height:70px;border-radius:50%;
background:#fff;color:#000;font-size:28px
}
</style>
</head>
<body>

<video autoplay playsinline></video>

<div class="bar">
<button onclick="zoom(.8)">0.5</button>
<button onclick="zoom(1)">1x</button>
<button onclick="zoom(1.5)">2x</button>
<button onclick="switchCam()">🔄</button>
</div>

<div class="bar">
<button class="capture" onclick="photo()">📷</button>
<button onclick="video()">🎥</button>
</div>

<canvas hidden></canvas>

<script>
let videoEl=document.querySelector("video");
let canvas=document.querySelector("canvas");
let facing="environment";
let stream;

async function start(){
if(stream)stream.getTracks().forEach(t=>t.stop());
stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:facing},
audio:true
});
videoEl.srcObject=stream;
}
start();

function switchCam(){
facing=facing=="environment"?"user":"environment";
start();
}

function zoom(x){
videoEl.style.transform="scale("+x+")";
}

function photo(){
canvas.width=videoEl.videoWidth;
canvas.height=videoEl.videoHeight;
canvas.getContext("2d").drawImage(videoEl,0,0);
let a=document.createElement("a");
a.href=canvas.toDataURL("image/png");
a.download="foto.png";
a.click();
}

let recorder,chunks=[];
function video(){
if(!recorder){
recorder=new MediaRecorder(stream);
recorder.ondataavailable=e=>chunks.push(e.data);
recorder.onstop=()=>{
let blob=new Blob(chunks,{type:"video/webm"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="video.webm";
a.click();
chunks=[];
recorder=null;
};
recorder.start();
alert("Rekam dimulai");
}else{
recorder.stop();
alert("Video disimpan");
}
}
</script>

</body>
</html>
