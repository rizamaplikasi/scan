<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesin Kasir Scan</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        /* Kotak untuk kamera */
        #reader {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            padding: 10px;
            box-sizing: border-box;
        }
        /* Kotak untuk menampilkan hasil scan */
        #result-container {
            margin-top: 20px;
            display: none; /* Disembunyikan sebelum ada hasil scan */
            padding: 15px;
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            border-radius: 8px;
            font-size: 1.2em;
            font-weight: bold;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>

    <h2>Mesin Kasir - Scan Barcode</h2>
    
    <div id="reader"></div>

    <div id="result-container">
        Kode Barang: <span id="scan-result"></span>
    </div>

    <script>
        // Fungsi ini akan berjalan jika barcode berhasil terbaca
        function onScanSuccess(decodedText, decodedResult) {
            // Tampilkan kotak hasil
            document.getElementById('result-container').style.display = 'block';
            // Masukkan teks barcode ke dalam kotak hasil
            document.getElementById('scan-result').innerText = decodedText;
            
            // Opsional: Kamu bisa menambahkan suara "beep" di sini atau 
            // menghubungkannya dengan database harga barang nanti.
        }

        // Fungsi ini berjalan jika kamera sedang mencari barcode tapi belum ketemu (diabaikan saja)
        function onScanFailure(error) {
            // Tidak perlu melakukan apa-apa agar scan terus berjalan mencari barcode
        }

        // Pengaturan scanner
        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", // Mengarah ke div dengan id="reader"
            { 
                fps: 10, // Kecepatan scan (frame per second)
                qrbox: {width: 250, height: 250} // Ukuran kotak panduan scan
            },
            /* verbose= */ false
        );

        // Memulai scanner
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>

</body>
</html>
