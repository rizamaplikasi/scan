<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Camera - Hand Tracking</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace; /* Font ala coding */
            background-color: #1e1e1e;
            color: #fff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* Bagian Kiri: Kamera */
        .camera-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            position: relative;
        }

        /* Video disembunyikan karena kita akan menggambarnya di Canvas */
        #input_video {
            display: none; 
        }

        #output_canvas {
            width: 100%;
            max-width: 800px;
            height: auto;
            border: 2px solid #333;
            border-radius: 10px;
            transform: scaleX(-1); /* Efek cermin agar gerakan natural */
        }

        /* Bagian Kanan: Log Data / "Coding" */
        .log-section {
            flex: 1;
            background-color: #0d1117; /* Warna gelap khas GitHub */
            padding: 20px;
            border-left: 2px solid #30363d;
            overflow-y: auto;
        }

        h2 {
            color: #58a6ff;
            margin-top: 0;
            border-bottom: 1px solid #30363d;
            padding-bottom: 10px;
        }

        #log_data {
            color: #7ee787; /* Warna hijau neon khas terminal */
            font-size: 14px;
            white-space: pre-wrap;
            line-height: 1.5;
        }

        /* Status Loading */
        #loading {
            position: absolute;
            color: white;
            font-size: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="camera-section">
            <div id="loading">Memuat Model AI Kamera... Izinkan akses webcam.</div>
            <video id="input_video"></video>
            <canvas id="output_canvas" width="640" height="480"></canvas>
        </div>

        <div class="log-section">
            <h2>Data Pelacakan Tangan (Real-time)</h2>
            <div id="log_data">Menunggu tangan terdeteksi...</div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const logElement = document.getElementById('log_data');
        const loadingElement = document.getElementById('loading');

        // Fungsi ini dipanggil setiap kali AI mendeteksi frame baru
        function onResults(results) {
            // Sembunyikan tulisan loading jika frame sudah berjalan
            loadingElement.style.display = 'none';

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // Gambar tangkapan video ke canvas
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            // Jika tangan terdeteksi
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                let logText = "";
                
                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    const landmarks = results.multiHandLandmarks[i];
                    
                    // 1. Gambar Garis (Konektor) mengikuti tangan
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS,
                                   {color: '#FFFFFF', lineWidth: 4}); // Garis putih
                                   
                    // 2. Gambar Titik Sendi (Landmarks) 
                    drawLandmarks(canvasCtx, landmarks, 
                                  {color: '#FF0000', lineWidth: 2, radius: 5}); // Titik merah

                    // 3. Ambil data titik ujung jari telunjuk (Landmark ke-8)
                    const indexFingerTip = landmarks[8];
                    
                    // Format data log ala kodingan JSON / Log Console
                    logText += `[ TANGAN KE-${i + 1} TERDETEKSI ]\n`;
                    logText += `> Status: AKTIF\n`;
                    logText += `> Ujung Jari Telunjuk:\n`;
                    logText += `   X (Horizontal) : ${indexFingerTip.x.toFixed(4)}\n`;
                    logText += `   Y (Vertikal)   : ${indexFingerTip.y.toFixed(4)}\n`;
                    logText += `   Z (Kedalaman)  : ${indexFingerTip.z.toFixed(4)}\n\n`;
                }
                
                logElement.innerText = logText;
            } else {
                // Jika tidak ada tangan di depan kamera
                logElement.innerText = "> Tidak ada pergerakan tangan yang terdeteksi.\n> Menunggu input...";
            }
            canvasCtx.restore();
        }

        // Konfigurasi Model AI MediaPipe
        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});
        
        hands.setOptions({
            maxNumHands: 2, // Maksimal mendeteksi 2 tangan sekaligus
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        
        hands.onResults(onResults);

        // Konfigurasi dan Mulai Kamera
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        
        camera.start();
    </script>
</body>
</html>
