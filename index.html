<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pro Code Studio - Portrait</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #1e1e1e; color: #fff; height: 100vh; display: flex; flex-direction: column; }
        
        .toolbar { background: #2d2d2d; padding: 10px; display: flex; gap: 5px; border-bottom: 1px solid #444; flex-wrap: wrap; }
        button { padding: 8px 12px; cursor: pointer; border-radius: 4px; border: none; background: #444; color: white; font-weight: bold; font-size: 12px; }
        button:hover { background: #555; }
        .btn-run { background: #007acc; }
        .btn-save { background: #28a745; }
        .btn-open { background: #e67e22; }

        .tabs { display: flex; background: #252526; }
        .tab-btn { padding: 10px; cursor: pointer; background: #2d2d2d; border: none; color: #aaa; flex: 1; }
        .tab-btn.active { background: #1e1e1e; color: #fff; border-top: 2px solid #007acc; }

        .editor-wrapper { flex: 1; display: flex; flex-direction: column; }
        .code-input { width: 100%; height: 100%; background: #1e1e1e; color: #d4d4d4; border: none; padding: 15px; font-family: 'Consolas', monospace; display: none; resize: none; outline: none; }
        .code-input.active { display: block; }

        #output-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; }
        #output { width: 100%; height: 100%; border: none; }
        .close-btn { position: absolute; top: 10px; right: 20px; background: red; color: white; border: none; padding: 8px 15px; cursor: pointer; z-index: 1001; }
    </style>
</head>
<body>

    <div class="toolbar">
        <button onclick="undo()">◀</button>
        <button onclick="redo()">▶</button>
        <button class="btn-open" onclick="document.getElementById('fileInput').click()">📁 Buka</button>
        <button class="btn-save" onclick="saveFile()">💾 Simpan</button>
        <button class="btn-run" onclick="runCode()">▶ Run</button>
        <input type="file" id="fileInput" style="display:none" onchange="loadFile(event)" accept=".html">
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('html', this)">HTML</button>
        <button class="tab-btn" onclick="showTab('css', this)">CSS</button>
        <button class="tab-btn" onclick="showTab('js', this)">JS</button>
    </div>

    <div class="editor-wrapper">
        <textarea id="htmlCode" class="code-input active" oninput="autoSave()" placeholder="HTML..."></textarea>
        <textarea id="cssCode" class="code-input" oninput="autoSave()" placeholder="CSS..."></textarea>
        <textarea id="jsCode" class="code-input" oninput="autoSave()" placeholder="JavaScript..."></textarea>
    </div>

    <div id="output-container">
        <button class="close-btn" onclick="closeOutput()">✖ Tutup</button>
        <iframe id="output"></iframe>
    </div>

    <script>
        // Fungsi Buka File
        function loadFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const content = e.target.result;
                // Sederhana: Memasukkan seluruh konten file ke HTML Editor
                document.getElementById('htmlCode').value = content;
                alert("File berhasil dimuat!");
            };
            reader.readAsText(file);
        }

        // Fungsi Simpan (tetap sama)
        function saveFile() {
            let fileName = prompt("Masukkan nama file:", "rcode.html");
            if (!fileName) return;
            if (!fileName.endsWith('.html')) fileName += ".html";
            const fullCode = `<!DOCTYPE html>\n<html>\n<head>\n<style>${document.getElementById('cssCode').value}</style>\n</head>\n<body>\n${document.getElementById('htmlCode').value}\n<script>${document.getElementById('jsCode').value}<\/script>\n</body>\n</html>`;
            const blob = new Blob([fullCode], {type: "text/html"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // Fungsi pendukung lainnya (autoSave, undo, redo, showTab, runCode) tetap sama seperti sebelumnya...
        let history = [{html: "", css: "", js: ""}];
        let currentIndex = 0;
        function autoSave() { /* Logika autoSave tetap sama */ }
        function undo() { if (currentIndex > 0) { currentIndex--; loadState(history[currentIndex]); } }
        function redo() { if (currentIndex < history.length - 1) { currentIndex++; loadState(history[currentIndex]); } }
        function loadState(state) {
            document.getElementById('htmlCode').value = state.html;
            document.getElementById('cssCode').value = state.css;
            document.getElementById('jsCode').value = state.js;
        }
        function showTab(lang, btn) {
            document.querySelectorAll('.code-input').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(lang + 'Code').classList.add('active');
            btn.classList.add('active');
        }
        function runCode() {
            const iframe = document.getElementById('output');
            iframe.srcdoc = `<html><head><style>${document.getElementById('cssCode').value}</style></head><body>${document.getElementById('htmlCode').value}<script>${document.getElementById('jsCode').value}<\/script></body></html>`;
            document.getElementById('output-container').style.display = 'block';
        }
        function closeOutput() { document.getElementById('output-container').style.display = 'none'; }
    </script>
</body>
</html>
