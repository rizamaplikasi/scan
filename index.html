<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Code Studio</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #1e1e1e; color: #fff; height: 100vh; display: flex; flex-direction: column; font-size: 16px; }
        
        /* Toolbar diperbesar */
        .toolbar { background: #2d2d2d; padding: 15px; display: flex; gap: 10px; border-bottom: 1px solid #444; flex-wrap: wrap; }
        button { padding: 12px 20px; cursor: pointer; border-radius: 6px; border: none; background: #444; color: white; font-weight: bold; font-size: 16px; }
        button:hover { background: #555; }
        
        /* Input Find */
        #findInput { padding: 10px; border-radius: 6px; border: none; width: 120px; font-size: 16px; }

        .tabs { display: flex; background: #252526; }
        .tab-btn { padding: 15px; cursor: pointer; background: #2d2d2d; border: none; color: #aaa; flex: 1; font-size: 16px; }
        .tab-btn.active { background: #1e1e1e; color: #fff; border-top: 3px solid #007acc; }

        .editor-wrapper { flex: 1; display: flex; flex-direction: column; }
        .code-input { width: 100%; height: 100%; background: #1e1e1e; color: #d4d4d4; border: none; padding: 20px; font-family: 'Consolas', monospace; font-size: 18px; display: none; resize: none; outline: none; line-height: 1.6; }
        .code-input.active { display: block; }

        /* Output Full Screen (Bukan mode desktop) */
        #output-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; }
        #output { width: 100%; height: 100%; border: none; }
        .close-btn { position: absolute; top: 20px; right: 20px; background: red; padding: 15px 25px; z-index: 1001; font-size: 18px; }
    </style>
</head>
<body>

    <div class="toolbar">
        <button onclick="undo()">◀</button>
        <button onclick="redo()">▶</button>
        <input type="text" id="findInput" placeholder="Cari..." onkeyup="findText()">
        <button onclick="document.getElementById('fileInput').click()">📁 Buka</button>
        <button style="background: #28a745;" onclick="saveFile()">💾 Simpan</button>
        <button style="background: #007acc;" onclick="runCode()">▶ Run</button>
        <input type="file" id="fileInput" style="display:none" onchange="loadFile(event)" accept=".html">
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('html', this)">HTML</button>
        <button class="tab-btn" onclick="showTab('css', this)">CSS</button>
        <button class="tab-btn" onclick="showTab('js', this)">JS</button>
    </div>

    <div class="editor-wrapper">
        <textarea id="htmlCode" class="code-input active" oninput="autoSave()"></textarea>
        <textarea id="cssCode" class="code-input" oninput="autoSave()"></textarea>
        <textarea id="jsCode" class="code-input" oninput="autoSave()"></textarea>
    </div>

    <div id="output-container">
        <button class="close-btn" onclick="closeOutput()">✖ Tutup</button>
        <iframe id="output"></iframe>
    </div>

    <script>
        // Fitur Find sederhana
        function findText() {
            const query = document.getElementById('findInput').value.toLowerCase();
            const activeEditor = document.querySelector('.code-input.active');
            const text = activeEditor.value.toLowerCase();
            if (query && text.includes(query)) {
                const index = text.indexOf(query);
                activeEditor.focus();
                activeEditor.setSelectionRange(index, index + query.length);
            }
        }

        // Fungsi Run disesuaikan agar tidak terlihat seperti mode desktop
        function runCode() {
            const iframe = document.getElementById('output');
            const html = document.getElementById('htmlCode').value;
            const css = document.getElementById('cssCode').value;
            const js = document.getElementById('jsCode').value;
            
            // Menggunakan srcdoc agar tampilan murni mengikuti ukuran layar perangkat
            iframe.srcdoc = `<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>${css}</style></head><body>${html}<script>${js}<\/script></body></html>`;
            document.getElementById('output-container').style.display = 'block';
        }

        // Fungsi lainnya tetap sama...
        function autoSave() { /* Logika sama */ }
        function saveFile() { 
            let fileName = prompt("Nama file:", "rcode.html") || "rcode.html";
            if (!fileName.endsWith('.html')) fileName += ".html";
            const blob = new Blob([document.getElementById('htmlCode').value], {type: "text/html"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = fileName;
            a.click();
        }
        function showTab(lang, btn) {
            document.querySelectorAll('.code-input').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(lang + 'Code').classList.add('active');
            btn.classList.add('active');
        }
        function closeOutput() { document.getElementById('output-container').style.display = 'none'; }
    </script>
</body>
</html>
